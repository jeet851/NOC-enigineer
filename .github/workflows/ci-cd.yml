name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # ==========================================
  # Job 1: Lint & Unit Testing
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest flake8 black

    - name: Code Quality Checks (Black & Flake8)
      run: |
        # Stop build if there are syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Check formatting consistency
        black --check . --exclude '/.venv/|/venv/'

    - name: Run Backend Unit Tests
      env:
        DATABASE_URL: "sqlite:///:memory:"
      run: |
        pytest -v

  # ==========================================
  # Job 2: Build & Push Container Image
  # ==========================================
  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: deploy/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/dashboard:latest
          ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/dashboard:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/dashboard:buildcache,mode=max

  # ==========================================
  # Job 3: Automated Kubernetes Rollout
  # ==========================================
  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Kubeconfig Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy Kubernetes Manifests
      run: |
        # Apply configurations
        kubectl apply -f deploy/k8s/k8s-statefulsets.yaml
        kubectl apply -f deploy/k8s/k8s-app.yaml
        kubectl apply -f deploy/k8s/k8s-workers.yaml
        kubectl apply -f deploy/k8s/ingress.yaml

    - name: Force Rolling Update Update
      run: |
        # Trigger rolling update rollout to pick up new container images
        kubectl set image deployment/noc-web-app web-server=ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
        kubectl set image deployment/noc-celery-worker celery-worker=ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
        
        # Verify rollout completion status
        kubectl rollout status deployment/noc-web-app --timeout=150s
