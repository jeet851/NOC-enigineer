apiVersion: apps/v1
kind: Deployment
metadata:
  name: noc-celery-worker
  namespace: default
  labels:
    app: noc-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: noc-celery-worker
  template:
    metadata:
      labels:
        app: noc-celery-worker
    spec:
      containers:
      - name: celery-worker
        image: ghcr.io/noc-ai/dashboard:latest
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "workers.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
        env:
        - name: DATABASE_URL
          value: "sqlite:////app/data/network_noc.db"
        - name: REDIS_URL
          value: "redis://noc-redis-headless:6379/0"
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@noc-rabbitmq-headless:5672//"
        resources:
          limits:
            cpu: "400m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/data
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-pvc
