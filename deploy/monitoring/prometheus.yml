global:
  scrape_interval: 15s     # Set default scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds

# Alertmanager configuration (optional but defined for failover)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - localhost:9093

# Scrape targets configuration
scrape_configs:
  # 1. Prometheus Server self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. FastAPI Application Web Server
  - job_name: 'noc_fastapi_app'
    metrics_path: '/api/health'
    scheme: 'https'
    tls_config:
      insecure_skip_verify: true # Ignore internal certificate validation within docker
    static_configs:
      - targets: ['web:5001']

  # 3. Redis Caching Engine Exporter
  - job_name: 'noc_redis_exporter'
    static_configs:
      - targets: ['redis:6379']

  # 4. RabbitMQ Queue Broker Cluster
  - job_name: 'noc_rabbitmq_exporter'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rabbitmq:15672']
