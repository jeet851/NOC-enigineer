user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Rate Limiting configuration
    limit_req_zone $binary_remote_addr zone=ip_rate_limit:10m rate=15r/s;
    limit_req_status 429;

    # Upstream Web Application service
    upstream backend_servers {
        server web:5001 max_fails=3 fail_timeout=10s;
    }

    # Redirect HTTP (Port 80) to HTTPS (Port 443)
    server {
        listen 80;
        listen [::]:80;
        server_name localhost 127.0.0.1;
        return 301 https://$host$request_uri;
    }

    # HTTPS Production Ingress server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name localhost 127.0.0.1;

        # Cryptographic TLS settings
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Zero-Trust Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';" always;

        client_max_body_size 15M;

        # Proxy routing
        location / {
            # Apply rate limiting to all requests
            limit_req zone=ip_rate_limit burst=25 delay=15;

            proxy_pass https://backend_servers;
            proxy_http_version 1.1;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSL verification override for internal Docker network
            proxy_ssl_verify off;
            proxy_ssl_session_reuse on;
        }

        # Health Checks path (no rate limits for probes)
        location /api/health {
            proxy_pass https://backend_servers;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
        }

        # Error redirection pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
